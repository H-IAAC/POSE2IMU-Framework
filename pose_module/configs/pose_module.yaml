pose_module:
  mode: offline
  fps_target: 20
  single_person_only: true
  save_intermediate: true

vitpose:
  model_alias: vitpose-b
  model_id: td-hm_ViTPose-base-simple_8xb64-210e_coco-256x192
  detector_model_id: rtmdet_m_8xb32-300e_coco
  device: auto
  keypoint_format: coco

motionbert:
  backend_name: mmpose_motionbert
  model_id: motionbert_dstformer-ft-243frm_8xb32-120e_h36m
  config_path: ""
  checkpoint_path: ""
  env_name: openmmlab
  device: auto
  window_size: 81
  window_overlap: 0.5
  include_confidence: true
  allow_fallback_backend: false

tracking:
  max_gap_frames: 5
  min_iou: 0.1
  max_center_distance: 1.75

cleaning:
  max_gap_interp: 5
  savgol_window: 9
  savgol_polyorder: 2
  low_conf_threshold: 0.2

root_estimator:
  smoothing_window: 9
  smoothing_polyorder: 2
  planarize_vertical: false
  root_discontinuity_warning_m: 0.15
  root_drift_score_warning: 0.05

ik:
  write_bvh: true
  bvh_filename: pose3d_ik.bvh
  sequence_filename: ik_sequence.npz
  reconstruction_warning_m: 0.05

imusim:
  sensor_layout_path: pose_module/configs/sensor_layout.yaml
  acc_noise_std_m_s2: 0.0
  gyro_noise_std_rad_s: 0.0
  random_seed: 0

quality:
  min_visible_joint_ratio: 0.8
  min_mean_confidence: 0.5
  max_outlier_ratio: 0.1
